<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Random name generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #1a1b26;
      color: #c0caf5;
    }
    h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.7;
      margin: 0 0 1.5rem;
    }
    #out {
      font-size: clamp(1.15rem, 3vw, 1.75rem);
      font-weight: 500;
      text-align: center;
      line-height: 1.45;
      max-width: 36rem;
      min-height: 3em;
      margin-bottom: 2rem;
      color: #7aa2f7;
    }
    button {
      font: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #7aa2f7;
      color: #1a1b26;
    }
    button:hover { filter: brightness(1.08); }
    button:active { transform: scale(0.98); }
  </style>
</head>
