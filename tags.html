<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https://*.supabase.co;"
    />
    <title>Favorite Eats - Tags</title>

    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/overrides.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/overlays.css" />

  </head>

  <body class="tags-page" data-page="tags">
    <script src="js/pageGate.js"></script>
    <script src="js/protectedPageGate.js"></script>
    <div id="appBarMount"></div>

    <main class="page-main">
      <div class="page-wrapper">
        <ul id="tagsList" class="list-view list-page"></ul>
      </div>
    </main>

    <nav class="bottom-nav bottom-nav--hidden no-select" aria-label="Primary">
      <div class="bottom-nav-pill-row">
        <button class="bottom-nav-pill" data-tab="recipes" type="button">
          Recipes
        </button>
        <button class="bottom-nav-pill" data-tab="shopping" type="button">
          Items
        </button>
        <button class="bottom-nav-pill" data-tab="stores" type="button">
          Stores
        </button>
        <button
          class="bottom-nav-pill bottom-nav-pill--active"
          data-tab="tags"
          type="button"
        >
          Tags
        </button>
        <button class="bottom-nav-pill" data-tab="sizes" type="button">
          Sizes
        </button>
        <button class="bottom-nav-pill" data-tab="units" type="button">
          Units
        </button>
      </div>
    </nav>

    <script src="js/utils.js"></script>
    <script src="js/data/adapters/supabaseAdapter.js"></script>
    <script src="js/data/index.js"></script>
    <script src="js/nameDeck.js"></script>
    <script src="js/nameDeckLists.js"></script>
    <script src="js/recipePresenceMoniker.js"></script>
    <script src="js/presenceToastMessage.js"></script>
    <script src="js/sqliteBlobCache.js"></script>
    <script src="js/main.js"></script>
    <script src="js/plannerDebugBadge.js"></script>
  </body>
</html>
