# LAN-only SQLite API. From this folder:
#   docker compose up -d --build
# DB file persists in ./data/app.db (create ./data first or Docker creates the mount)
# Browse docs: http://<NAS-or-PC-IP>:8080/docs

services:
  api:
    build: .
    ports:
      - '8080:8080'
    volumes:
      - ./data:/data
    environment:
      SQLITE_PATH: /data/app.db
    restart: unless-stopped
