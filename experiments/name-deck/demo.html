<!doctype html>
<html lang="en" class="name-deck-demo">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Name deck demo (experiment)</title>
    <!-- Same order + font as recipeEditor.html so tokens match the real app -->
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/overrides.css" />
    <link rel="stylesheet" href="../../css/styles.css" />
    <link rel="stylesheet" href="../../css/overlays.css" />
    <link rel="stylesheet" href="name-deck-demo.css" />
  </head>
  <body>
    <div id="accountBadge" class="name-deck-demo__account-badge" aria-label="Account badge">?</div>

    <h1 class="name-deck-demo__title">Name deck (persisted)</h1>
    <p id="out">
      On load this demo picks the first pair in a fresh deck, shows a top-right account badge from the B-side initial,
      then after 400ms toasts: <code>Logged in as &lt;name&gt;</code>.
    </p>
    <p id="progress" aria-live="polite"></p>
    <button type="button" id="gen">Generate</button>
    <p class="name-deck-demo__hint">
      State: <code>NameDeck.DEFAULT_KEY</code> in <code>localStorage</code>. Serve this folder over HTTP if
      <code>file://</code> blocks storage.
    </p>

    <script src="uiToast.js"></script>
    <script src="lists.sample.js"></script>
    <script src="nameDeck.js"></script>
    <script src="presenceToastMessage.js"></script>
    <script>
      (function () {
        var session = NameDeck.createSession({
          listA: window.NAME_DECK_LIST_A,
          listB: window.NAME_DECK_LIST_B,
          storage: typeof localStorage !== 'undefined' ? localStorage : null,
        });

        var progress = document.getElementById('progress');
        var badge = document.getElementById('accountBadge');
        var TOAST_MS = 12000;
        var LOGIN_TOAST_DELAY_MS = 400;
        /** Optional: set to a real recipe title string to match “... is editing <title>.” */
        var DEMO_RECIPE_TITLE = '';

        function splitPairByKnownA(fullName) {
          var name = String(fullName || '');
          var candidates = window.NAME_DECK_LIST_A.slice().sort(function (a, b) {
            return b.length - a.length;
          });
          for (var i = 0; i < candidates.length; i++) {
            var left = candidates[i];
            var prefix = left + ' ';
            if (name.indexOf(prefix) === 0) {
              return { a: left, b: name.slice(prefix.length) };
            }
          }
          return { a: '', b: name };
        }

        function firstAlphaUpper(s, fallback) {
          var m = String(s || '').match(/\p{L}/u);
          if (m) {
            return m[0].toUpperCase();
          }
          var mf = String(fallback || '').match(/\p{L}/u);
          if (mf) {
            return mf[0].toUpperCase();
          }
          return 'A';
        }

        var first = session.next();
        var firstName = first.text;
        var parsed = splitPairByKnownA(firstName);
        badge.textContent = firstAlphaUpper(parsed.b, parsed.a);
        badge.setAttribute('title', firstName);
        progress.textContent =
          'Pair ' + first.progress.shown + ' of ' + first.progress.total + ' · round ' + first.progress.round;

        window.setTimeout(function () {
          if (window.ui && typeof window.ui.toast === 'function') {
            window.ui.toast({ message: 'Logged in as ' + firstName, timeoutMs: TOAST_MS });
          }
        }, LOGIN_TOAST_DELAY_MS);

        document.getElementById('gen').addEventListener('click', function () {
          var r = session.next();
          progress.textContent =
            'Pair ' + r.progress.shown + ' of ' + r.progress.total + ' · round ' + r.progress.round;
          if (window.ui && typeof window.ui.toast === 'function') {
            var line = window.presenceToastMessage.presenceEditingMessage(r.text, DEMO_RECIPE_TITLE);
            window.ui.toast({ message: line, timeoutMs: TOAST_MS });
          }
        });
      })();
    </script>
  </body>
</html>
