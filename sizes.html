<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; connect-src 'self' https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;"
    />
    <title>Favorite Eats - Sizes</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <link rel="stylesheet" href="css/overrides.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/overlays.css" />

  </head>

  <body class="sizes-page" data-page="sizes">
    <script src="js/pageGate.js"></script>
    <script src="js/protectedPageGate.js"></script>
    <div id="appBarMount"></div>

    <main class="page-main">
      <div class="page-wrapper">
        <ul id="sizesList" class="list-view list-page"></ul>
      </div>
    </main>

    <nav class="bottom-nav bottom-nav--hidden no-select" aria-label="Primary">
      <div class="bottom-nav-pill-row">
        <button class="bottom-nav-pill" data-tab="recipes" type="button">
          Recipes
        </button>
        <button class="bottom-nav-pill" data-tab="shopping" type="button">
          Items
        </button>
        <button class="bottom-nav-pill" data-tab="stores" type="button">
          Stores
        </button>
        <button class="bottom-nav-pill" data-tab="tags" type="button">
          Tags
        </button>
        <button
          class="bottom-nav-pill bottom-nav-pill--active"
          data-tab="sizes"
          type="button"
        >
          Sizes
        </button>
        <button class="bottom-nav-pill" data-tab="units" type="button">
          Units
        </button>
      </div>
    </nav>

    <script src="js/utils.js"></script>
    <script src="js/data/adapters/supabaseAdapter.js"></script>
    <script src="js/data/index.js"></script>
    <script src="js/presenceToastMessage.js"></script>
    <script src="js/sqliteBlobCache.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
