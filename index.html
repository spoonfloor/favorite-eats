<!DOCTYPE html>
<html lang="en" data-platform="planner">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Favorite Eats" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#E65133" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co;"
    />
    <title>Favorite Eats</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link
      rel="apple-touch-startup-image"
      href="icons/splash-1179x2556.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="icons/splash-1179x2556.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />

    <!-- Load Literata (content) + DM Sans (UI); tokens: --content-font-default / --ui-font-default -->
    <!-- CSS -->
    <script src="js/chromeBoot.js"></script>
    <link
      rel="preload"
      href="assets/fonts/material-symbols-outlined.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/overrides.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/overlays.css" />
  </head>
  <body>
    <div class="centered-container">
      <div class="welcome-card">
        <h1 id="splash-gate-title">Favorite Eats!</h1>
        <form id="splashGateForm" class="welcome-card__actions" autocomplete="off">
          <input
            id="splashPasswordInput"
            class="splash-gate-input"
            type="password"
            name="password"
            placeholder="Password"
            aria-label="Password"
            autocomplete="current-password"
            required
          />
          <button id="splashContinueBtn" class="button-filled" type="submit">
            Continue
          </button>
        </form>
        <p
          id="splashGateError"
          class="ui-dialog-error"
          role="alert"
          aria-live="polite"
          hidden
        ></p>
      </div>
    </div>

    <script src="js/nameDeck.js"></script>
    <script src="js/nameDeckLists.js"></script>
    <script src="js/data/adapters/supabaseAdapter.js"></script>
    <script src="js/data/index.js"></script>
    <script src="js/recipePresenceMoniker.js"></script>
    <script src="js/demoSession.js"></script>
    <script src="js/welcome.js"></script>
    <script src="js/pageGate.js"></script>
    <script src="js/splashGate.js"></script>
  </body>
</html>
