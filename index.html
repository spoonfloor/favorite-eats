<!DOCTYPE html>
<html lang="en" data-platform="planner">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co;"
    />
    <title>Favorite Eats Editor</title>
    <link rel="icon" href="data:," />

    <!-- Load Literata (content) + DM Sans (UI); tokens: --content-font-default / --ui-font-default -->
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/overrides.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/overlays.css" />
  </head>
  <body>
    <div class="centered-container">
      <div class="welcome-card">
        <h1 id="splash-gate-title">Favorite Eats!</h1>
        <form id="splashGateForm" class="welcome-card__actions" autocomplete="off">
          <input
            id="splashPasswordInput"
            class="splash-gate-input"
            type="password"
            name="password"
            placeholder="Password"
            aria-label="Password"
            autocomplete="current-password"
            required
          />
          <button id="splashContinueBtn" class="button-filled" type="submit">
            Continue
          </button>
        </form>
        <p
          id="splashGateError"
          class="ui-dialog-error"
          role="alert"
          aria-live="polite"
          hidden
        ></p>
      </div>
    </div>

    <script src="js/nameDeck.js"></script>
    <script src="js/nameDeckLists.js"></script>
    <script src="js/recipePresenceMoniker.js"></script>
    <script src="js/welcome.js"></script>
    <script src="js/pageGate.js"></script>
    <script src="js/splashGate.js"></script>
  </body>
</html>
