<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co;"
    />
    <title>Favorite Eats Editor</title>
    <link rel="icon" href="data:," />

    <!-- Load Red Hat Mono font (same as other app pages; drives --main-font) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/overrides.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/overlays.css" />
  </head>
  <body>
    <div class="centered-container">
      <div class="welcome-card">
        <h1 class="nav-text">Favorite Eats!</h1>
        <form id="splashGateForm" class="welcome-card__actions" autocomplete="off">
          <input
            id="splashPasswordInput"
            class="splash-gate-input nav-text"
            type="password"
            name="password"
            placeholder="Password"
            aria-label="Password"
            required
          />
          <button id="splashContinueBtn" class="button nav-text" type="submit">
            Continue
          </button>
        </form>
        <p
          id="splashGateError"
          class="ui-dialog-error nav-text"
          role="alert"
          aria-live="polite"
          hidden
        ></p>
      </div>
    </div>

    <script src="js/nameDeck.js"></script>
    <script src="js/nameDeckLists.js"></script>
    <script src="js/recipePresenceMoniker.js"></script>
    <script src="js/welcome.js"></script>
    <script src="js/pageGate.js"></script>
    <script src="js/splashGate.js"></script>
  </body>
</html>
