<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://cdnjs.cloudflare.com;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorite Eats Proto - Recipe</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="../css/overrides.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/overlays.css" />
    <link rel="stylesheet" href="proto.css" />
  </head>
  <body class="proto-shell-page">
    <div class="proto-shell">
      <header class="proto-appbar">
        <div class="proto-appbar-row">
          <a class="proto-back-link" href="index.html" aria-label="Back to recipes">
            <span class="proto-back-link-icon" aria-hidden="true">arrow_back</span>
          </a>
          <h1 class="proto-appbar-title" id="protoAppbarTitle">Recipe</h1>
        </div>
      </header>

      <main class="proto-main">
        <section class="proto-card">
          <div class="proto-panel-body is-content">
            <div class="proto-detail-view">
              <h2 class="proto-detail-title" id="protoRecipeTitle">Recipe</h2>
              <div class="proto-detail-servings-row" id="protoRecipeServingsRow" hidden>
                <p class="proto-detail-servings" id="protoRecipeServings"></p>
                <div class="proto-stepper" id="protoRecipeServingsStepper" hidden>
                  <button
                    type="button"
                    class="proto-stepper-button"
                    id="protoRecipeServingsDecrease"
                    data-stepper-action="decrease"
                    aria-label="Decrease servings"
                  >
                    -
                  </button>
                  <span
                    class="proto-stepper-value"
                    id="protoRecipeServingsValue"
                    data-stepper-value="true"
                    aria-live="polite"
                    aria-atomic="true"
                  ></span>
                  <button
                    type="button"
                    class="proto-stepper-button"
                    id="protoRecipeServingsIncrease"
                    data-stepper-action="increase"
                    aria-label="Increase servings"
                  >
                    +
                  </button>
                </div>
              </div>

              <section class="proto-detail-section" aria-labelledby="protoIngredientsHeading">
                <h3 class="proto-detail-section-title" id="protoIngredientsHeading">
                  Ingredients
                </h3>
                <div class="proto-detail-lines" id="protoRecipeIngredients"></div>
              </section>

              <section
                class="proto-detail-section"
                id="protoInstructionsSection"
                aria-labelledby="protoInstructionsHeading"
              >
                <h3 class="proto-detail-section-title" id="protoInstructionsHeading">
                  Instructions
                </h3>
                <div class="proto-detail-lines" id="protoRecipeInstructions"></div>
              </section>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/sql-wasm.js"></script>
    <script src="proto-db.js"></script>
    <script src="proto-stepper.js"></script>
    <script src="proto-recipe-detail.js"></script>
  </body>
</html>
