<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorite Eats Proto - Items</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="../css/overrides.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/overlays.css" />
    <link rel="stylesheet" href="proto.css" />
  </head>
  <body class="proto-shell-page" data-proto-page="items">
    <div class="proto-shell">
      <header class="proto-appbar">
        <h1 class="proto-appbar-title" id="protoAppbarTitle">Items</h1>
      </header>

      <main class="proto-main">
        <section class="proto-card" aria-live="polite">
          <div class="proto-panel-body is-empty" id="protoPanelBody">
            <div class="proto-empty-state" id="protoEmptyState">
              <div class="proto-empty-icon" id="protoEmptyIcon">shopping_bag</div>
              <p class="proto-empty-copy" id="protoEmptyCopy">
                No extra shopping items selected yet.
              </p>
              <div class="proto-empty-action-row">
                <button
                  type="button"
                  class="proto-action-button"
                  id="protoEmptyAction"
                  hidden
                ></button>
              </div>
            </div>
          </div>
        </section>
      </main>

      <nav class="proto-tabbar" aria-label="Prototype tabs">
        <div class="proto-tabbar-scroll">
          <div class="proto-tabbar-row" id="protoTabRow"></div>
        </div>
      </nav>
    </div>

    <script src="proto-shell.js"></script>
    <script src="proto-placeholder.js"></script>
  </body>
</html>
