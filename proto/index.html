<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https://cdnjs.cloudflare.com;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorite Eats Proto - Recipes</title>
    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/overrides.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/overlays.css" />
    <link rel="stylesheet" href="proto.css" />
  </head>
  <body class="proto-shell-page" data-proto-page="recipes">
    <div class="proto-shell">
      <header class="proto-appbar">
        <h1 class="proto-appbar-title" id="protoAppbarTitle">Recipes</h1>
      </header>

      <main class="proto-main">
        <section class="proto-card" aria-live="polite">
          <div class="proto-panel-body is-empty" id="protoPanelBody">
            <div class="proto-empty-state" id="protoEmptyState">
              <div class="proto-empty-icon" id="protoEmptyIcon">menu_book</div>
              <p class="proto-empty-copy" id="protoEmptyCopy">
                No recipes loaded yet.
              </p>
              <div class="proto-empty-action-row">
                <button
                  type="button"
                  class="proto-action-button"
                  id="protoEmptyAction"
                  hidden
                ></button>
              </div>
            </div>

            <ul
              class="proto-recipe-list proto-content-region"
              id="protoRecipeList"
              data-proto-content-region="true"
              hidden
            ></ul>

            <input
              type="file"
              id="protoDbFileInput"
              class="proto-file-input"
              accept=".db,.sqlite,.sqlite3"
            />
          </div>
        </section>
      </main>

      <nav class="proto-tabbar" aria-label="Prototype tabs">
        <div class="proto-tabbar-scroll">
          <div class="proto-tabbar-row" id="protoTabRow"></div>
        </div>
      </nav>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/sql-wasm.js"></script>
    <script src="../js/sqliteBlobCache.js"></script>
    <script src="proto-shell.js"></script>
    <script src="proto-db.js"></script>
    <script src="proto-recipes.js"></script>
  </body>
</html>
